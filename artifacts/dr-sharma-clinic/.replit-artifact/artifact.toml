kind = "web"
previewPath = "/"
title = "DR. M.L. SHARMA CLINIC"
version = "1.0.0"
id = "artifacts/dr-sharma-clinic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24860
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dr-sharma-clinic run dev"

[services.env]
PORT = "24860"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dr-sharma-clinic", "run", "build"]
publicDir = "artifacts/dr-sharma-clinic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
